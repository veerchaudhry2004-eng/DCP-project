<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading List — DCP</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    #entry-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(153,218,255,0.96);
      z-index: 2000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .entry-modal-box {
      width: 480px; max-width: 90vw;
      border: 2px solid #ce0a16;
      padding: 32px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .entry-modal-box h3 {
      font-family: 'Didot','GFS Didot',Georgia,serif;
      font-style: italic; font-size: 1.1rem;
    }
    .entry-modal-box label { font-size: 0.8rem; font-style: italic; display: block; margin-bottom: 4px; }
    .entry-modal-box input,
    .entry-modal-box textarea {
      width: 100%; background: transparent;
      border: none; border-bottom: 1px solid #ce0a16;
      color: #ce0a16; font-family: 'Andale Mono',monospace;
      font-size: 0.83rem; padding: 4px 0; outline: none;
    }
    .entry-modal-box textarea {
      border: 1px solid rgba(206,10,22,0.4);
      padding: 8px; resize: vertical; min-height: 90px; margin-top: 4px;
    }
    .entry-modal-btns { display: flex; gap: 12px; justify-content: flex-end; }
    .entry-modal-btns button {
      background: none; border: 2px solid #ce0a16;
      color: #ce0a16; font-family: 'Andale Mono',monospace;
      font-size: 0.78rem; padding: 7px 18px; cursor: pointer;
    }
    .entry-modal-btns button:hover { background: rgba(206,10,22,0.1); }
  </style>
</head>
<body>
  <button class="hamburger" id="hamburger" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-overlay" id="nav-overlay">
    <a href="project-statement.html">Project Statement</a>
    <a href="archive.html">The Archive</a>
    <a href="made-in.html">Made-in</a>
    <a href="resides-in.html">Resides-in</a>
    <a href="reading-list.html">Reading List</a>
    <a href="upload.html">Upload</a>
  </nav>

  <a class="site-title-btn" href="index.html">What Looks Good? What Feels Good? What Is Good?</a>

  <main>
    <h2 class="page-title">Reading List</h2>
    <div class="reading-body">
      <div id="reading-list-container"></div>
    </div>
  </main>

  <button class="float-btn add-entry-btn" id="add-entry-btn">+ Add Entry</button>

  <div id="entry-modal">
    <div class="entry-modal-box">
      <h3>New Reading Entry</h3>
      <div>
        <label>Title / Author</label>
        <input type="text" id="entry-title-input" placeholder="e.g. Author Name — Book Title">
      </div>
      <div>
        <label>Notes (one per line)</label>
        <textarea id="entry-bullets-input" placeholder="Note one&#10;Note two&#10;Note three"></textarea>
      </div>
      <div class="entry-modal-btns">
        <button id="entry-modal-cancel">Cancel</button>
        <button id="entry-modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/reading-list.js"></script>
</body>
</html>
