<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload — DCP</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .upload-page-inner {
      max-width: 560px;
      margin: 0 auto;
      padding: 10px 24px 100px;
    }

    /* Drop zone / image picker */
    #image-drop-zone {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 2px solid #ce0a16;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      margin-bottom: 28px;
      background: rgba(255,255,255,0.35);
      transition: background 0.2s;
    }
    #image-drop-zone:hover { background: rgba(255,255,255,0.5); }
    #image-drop-zone.has-image { background: transparent; }
    #image-drop-zone.has-image .drop-hint { display: none; }

    .drop-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }
    .drop-hint svg { width: 64px; height: 64px; }
    .drop-hint span {
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      opacity: 0.7;
      font-style: italic;
    }

    #image-preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #image-drop-zone:not(.has-image) #image-preview-img { display: none; }

    .change-photo-hint {
      display: none;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(153,218,255,0.75);
      text-align: center;
      font-size: 0.72rem;
      padding: 6px;
      letter-spacing: 0.04em;
    }
    #image-drop-zone.has-image:hover .change-photo-hint { display: block; }

    /* Location row */
    .location-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }
    .location-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border: 2px solid #ce0a16;
      background: none;
      color: #ce0a16;
      font-family: 'Andale Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      padding: 14px 8px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    .location-btn:hover { background: rgba(206,10,22,0.08); }
    .location-btn.is-set { background: rgba(206,10,22,0.1); }
    .location-btn svg { width: 32px; height: 32px; }
    .location-btn .loc-label {
      font-size: 0.65rem;
      opacity: 0.7;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .location-btn .checkmark {
      display: none;
      position: absolute;
      top: 6px; right: 8px;
      font-size: 0.7rem;
    }
    .location-btn.is-set .checkmark { display: block; }

    /* Form fields */
    .fields-section { display: flex; flex-direction: column; gap: 0; }
    .field-item {
      display: flex;
      align-items: baseline;
      gap: 0;
      border-bottom: 1px solid rgba(206,10,22,0.3);
      padding: 12px 0;
    }
    .field-item label {
      font-family: 'Didot','GFS Didot',Georgia,serif;
      font-style: italic;
      font-size: 0.9rem;
      min-width: 180px;
      flex-shrink: 0;
    }
    .field-item input {
      flex: 1;
      background: transparent;
      border: none;
      color: #ce0a16;
      font-family: 'Andale Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      padding: 0;
    }
    .field-item input::placeholder { color: rgba(206,10,22,0.3); }

    /* Submit / Post */
    .post-btn {
      width: 100%;
      padding: 14px;
      margin-top: 32px;
      background: #ce0a16;
      border: none;
      color: #99daff;
      font-family: 'Didot','GFS Didot',Georgia,serif;
      font-style: italic;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .post-btn:hover { opacity: 0.88; }
    .post-btn:disabled { opacity: 0.45; cursor: default; }

    /* Success message */
    #success-msg {
      text-align: center;
      font-style: italic;
      font-size: 0.85rem;
      margin-top: 14px;
      opacity: 0;
      transition: opacity 0.4s;
    }
  </style>
</head>
<body>
  <button class="hamburger" id="hamburger" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-overlay" id="nav-overlay">
    <a href="project-statement.html">Project Statement</a>
    <a href="archive.html">The Archive</a>
    <a href="made-in.html">Made-in</a>
    <a href="resides-in.html">Resides-in</a>
    <a href="reading-list.html">Reading List</a>
    <a href="upload.html">Upload</a>
  </nav>

  <a class="site-title-btn" href="index.html">What Looks Good? What Feels Good? What Is Good?</a>

  <main>
    <h2 class="page-title">Upload</h2>
    <div class="upload-page-inner">
      <form id="upload-form">

        <!-- Image picker -->
        <div id="image-drop-zone">
          <img id="image-preview-img" src="" alt="Preview">
          <div class="drop-hint">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="8" width="48" height="40" rx="2" stroke="#ce0a16" stroke-width="3"/>
              <circle cx="16" cy="20" r="5" stroke="#ce0a16" stroke-width="2.5"/>
              <path d="M4 36 L20 22 L34 34 L44 26 L52 36" stroke="#ce0a16" stroke-width="2.5" stroke-linejoin="round"/>
              <circle cx="50" cy="50" r="12" fill="#ce0a16"/>
              <path d="M50 43 V57 M43 50 H57" stroke="#99daff" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <span>Tap to add photo</span>
          </div>
          <div class="change-photo-hint">tap to change</div>
        </div>
        <input type="file" id="image-input" accept="image/*" style="display:none">

        <!-- Location buttons -->
        <div class="location-row">
          <button type="button" class="location-btn" id="add-made-in-btn">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 4C11 4 7 8 7 13C7 20 16 28 16 28C16 28 25 20 25 13C25 8 21 4 16 4Z" stroke="#ce0a16" stroke-width="2.2"/>
              <circle cx="16" cy="13" r="4" stroke="#ce0a16" stroke-width="2.2"/>
            </svg>
            Place of Manufacture
            <div class="loc-label" id="made-in-display">not set</div>
            <span class="checkmark">✓</span>
          </button>
          <button type="button" class="location-btn" id="add-resides-in-btn">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 4C11 4 7 8 7 13C7 20 16 28 16 28C16 28 25 20 25 13C25 8 21 4 16 4Z" stroke="#ce0a16" stroke-width="2.2"/>
              <circle cx="16" cy="13" r="4" stroke="#ce0a16" stroke-width="2.2"/>
            </svg>
            Permanent Location
            <div class="loc-label" id="resides-in-display">not set</div>
            <span class="checkmark">✓</span>
          </button>
        </div>

        <!-- Fields -->
        <div class="fields-section">
          <div class="field-item">
            <label for="owner-age">Owner Age</label>
            <input type="text" id="owner-age" placeholder="e.g. 32">
          </div>
          <div class="field-item">
            <label for="owner-education">Owner Education</label>
            <input type="text" id="owner-education" placeholder="e.g. BA Architecture">
          </div>
          <div class="field-item">
            <label for="object-material">Object Material</label>
            <input type="text" id="object-material" placeholder="e.g. Leather, steel">
          </div>
          <div class="field-item">
            <label for="object-source">Object Source</label>
            <input type="text" id="object-source" placeholder="e.g. Gift, purchased">
          </div>
          <div class="field-item">
            <label for="place-of-manufacture">Place of Manufacture</label>
            <input type="text" id="place-of-manufacture" placeholder="Set via pin or type here">
          </div>
          <div class="field-item">
            <label for="acquisition-date">Acquisition Date</label>
            <input type="text" id="acquisition-date" placeholder="e.g. 2019">
          </div>
          <div class="field-item">
            <label for="permanent-location">Permanent Location</label>
            <input type="text" id="permanent-location" placeholder="Set via pin or type here">
          </div>
          <div class="field-item">
            <label for="cost">Cost</label>
            <input type="text" id="cost" placeholder="e.g. £240">
          </div>
        </div>

        <button type="submit" class="post-btn" id="submit-btn">Post</button>
        <p id="success-msg">Posted to the archive.</p>

      </form>
    </div>
  </main>

  <!-- Map modal -->
  <div class="map-modal" id="map-modal">
    <p class="map-modal-title" id="modal-title-text"></p>
    <p class="map-modal-hint">Click anywhere on the map to place a pin</p>
    <div class="map-modal-inner">
      <svg id="modal-map"></svg>
    </div>
    <div class="modal-selected-label" id="modal-selected-label"></div>
    <button type="button" class="modal-close-btn" id="modal-close-btn">Confirm &amp; Close</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson@3/dist/topojson.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/map.js"></script>
  <script src="js/upload.js"></script>
  <script>
    // Visual feedback on location buttons
    document.getElementById('add-made-in-btn').addEventListener('click', () => {
      // handled in upload.js — just add visual state once set
    });
    // Watch for location set and update button state
    const madeInObs = new MutationObserver(() => {
      const txt = document.getElementById('made-in-display').textContent;
      document.getElementById('add-made-in-btn').classList.toggle('is-set', txt && txt !== 'not set');
    });
    madeInObs.observe(document.getElementById('made-in-display'), { childList: true, characterData: true, subtree: true });

    const residesObs = new MutationObserver(() => {
      const txt = document.getElementById('resides-in-display').textContent;
      document.getElementById('add-resides-in-btn').classList.toggle('is-set', txt && txt !== 'not set');
    });
    residesObs.observe(document.getElementById('resides-in-display'), { childList: true, characterData: true, subtree: true });
  </script>
</body>
</html>
